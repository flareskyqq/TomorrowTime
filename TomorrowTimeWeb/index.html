<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>时间计算器</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <link rel="apple-touch-icon-precomposed" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <meta name="apple-mobile-web-app-title" content="时间计算器">
  <style>
    :root {
      --primary: #1A73E8;
      --primary-light: #E8F0FE;
      --text: #202124;
      --border: #DADCE0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      background: white;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    .preset-list { padding: 16px; }

    .item {
      position: relative;
      margin-bottom: 10px;
      border-radius: 8px;
      overflow: hidden;
    }
    .item-content {
      background: white;
      border: 1px solid var(--border);
      padding: 14px 16px;
      font-size: 18px;
      background: #fff;
      display: flex;
      align-items: center;
      touch-action: pan-y;
    }
    .item-content.selected {
      background: var(--primary-light);
      border-color: var(--primary);
      border-left: 4px solid var(--primary);
    }
    .item-content .time {
      flex: 1;
    }
    .item .delete-area {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 70px;
      background: #F44336;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      opacity: 0;
      pointer-events: none;
    }
    .item.show-delete .delete-area { opacity: 1; }
    .item.show-delete .item-content { transform: translateX(-70px); }

    .item-content { transition: transform 0.15s; }

    .empty-hint {
      text-align: center;
      color: #9AA0A6;
      padding: 40px;
      font-size: 14px;
    }

    .add-section { padding: 0 16px 16px; }
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--primary);
      font-size: 16px;
      padding: 14px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
    }

    .calc-section {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .calc-btn {
      width: 80%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      padding: 14px;
    }
    .calc-btn:disabled {
      background: #DADCE0;
      color: #9AA0A6;
    }
    .result-card {
      width: 90%;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      display: none;
    }
    .result-card.show { display: block; }
    .result-text {
      font-size: 18px;
      color: var(--text);
      line-height: 1.6;
    }

    /* Picker */
    .picker-mask {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .picker-mask.active { display: block; }
    .picker-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .cancel-btn { color: #666; font-size: 16px; }
    .confirm-btn { color: var(--primary); font-size: 16px; font-weight: bold; }
    .title { color: var(--text); font-size: 16px; }
    .wheel { display: flex; height: 200px; overflow: hidden; }
    .wheel-col { flex: 1; height: 200px; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
    .wheel-col::-webkit-scrollbar { display: none; }
    .wheel-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #9AA0A6;
    }
    .wheel-item.active { color: var(--text); font-weight: 600; font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">时间计算器</div>
    <div class="preset-list" id="list"></div>
    <div class="add-section">
      <div class="add-btn" id="addBtn">+ 添加时间</div>
    </div>
    <div class="calc-section">
      <button class="calc-btn" id="calcBtn" disabled>计算</button>
      <div class="result-card" id="resultCard">
        <div class="result-text" id="resultText"></div>
      </div>
    </div>
  </div>

  <!-- Picker -->
  <div class="picker-mask" id="pickerMask">
    <div class="picker-panel">
      <div class="picker-header">
        <span class="cancel-btn" id="cancelBtn">取消</span>
        <span class="title">选择时间</span>
        <span class="confirm-btn" id="confirmBtn">确定</span>
      </div>
      <div class="wheel">
        <div class="wheel-col" id="hourCol"></div>
        <div class="wheel-col" id="minCol"></div>
      </div>
    </div>
  </div>

  <script>
    let times = [];
    let selected = -1;
    let touchX = 0;
    let activeItem = -1;
    let pickerH = 0, pickerM = 0;

    const list = document.getElementById('list');
    const calcBtn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    const pickerMask = document.getElementById('pickerMask');
    const hourCol = document.getElementById('hourCol');
    const minCol = document.getElementById('minCol');

    function init() {
      const s = localStorage.getItem('t');
      if (s) {
        times = JSON.parse(s);
      }
      render();
      buildPicker();
    }

    function save() {
      localStorage.setItem('t', JSON.stringify(times));
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function render() {
      if (!times.length) {
        list.innerHTML = '<div class="empty-hint">暂无预设时间，请点击下方添加</div>';
      } else {
        list.innerHTML = times.map((t, i) => `
          <div class="item ${t.show ? 'show-delete' : ''}" data-i="${i}">
            <div class="item-content ${selected === i ? 'selected' : ''}" data-i="${i}">${pad(t.hour)}:${pad(t.minute)}</div>
            <div class="delete-area" data-i="${i}">删除</div>
          </div>
        `).join('');

        // 绑定每个 item 的 touch 事件
        list.querySelectorAll('.item').forEach(el => {
          const idx = parseInt(el.dataset.i);

          el.addEventListener('touchstart', function(e) {
            touchX = e.touches[0].clientX;
            activeItem = idx;
          }, { passive: true });

          el.addEventListener('touchend', function(e) {
            const dx = e.changedTouches[0].clientX - touchX;
            if (dx > 30) {
              // 右滑 → 显示删除
              times.forEach((t, i) => t.show = i === idx);
            } else if (dx < -30) {
              // 左滑 → 隐藏删除
              times.forEach(t => t.show = false);
            }
            activeItem = -1;
            render();
          }, { passive: true });
        });
      }

      calcBtn.disabled = selected === -1;
      resultCard.classList.remove('show');
    }

    // 点击列表
    list.onclick = function(e) {
      const del = e.target.closest('.delete-area');
      if (del) {
        e.stopPropagation();
        const idx = parseInt(del.dataset.i);
        times.splice(idx, 1);
        if (selected >= times.length) selected = times.length - 1;
        if (selected < 0) selected = -1;
        save();
        render();
        return;
      }
      const content = e.target.closest('.item-content');
      if (content) {
        selected = parseInt(content.dataset.i);
        // 点击内容也隐藏删除按钮
        times.forEach(t => t.show = false);
        render();
      }
    };

    // 添加按钮
    document.getElementById('addBtn').onclick = function() {
      const now = new Date();
      pickerH = now.getHours() + 1;
      if (pickerH >= 24) pickerH = 0;
      pickerM = now.getMinutes();
      times.forEach(t => t.show = false);
      render();
      pickerMask.classList.add('active');
      scrollTo(hourCol, pickerH);
      scrollTo(minCol, pickerM);
      updateActive();
    };

    document.getElementById('cancelBtn').onclick = function() {
      pickerMask.classList.remove('active');
    };

    document.getElementById('confirmBtn').onclick = function() {
      times.push({ hour: pickerH, minute: pickerM, show: false });
      times.sort((a, b) => a.hour !== b.hour ? a.hour - b.hour : a.minute - b.minute);
      save();
      render();
      pickerMask.classList.remove('active');
    };

    function buildPicker() {
      hourCol.innerHTML = Array.from({length: 24}, (_, i) =>
        `<div class="wheel-item" data-v="${i}">${pad(i)}时</div>`
      ).join('');
      minCol.innerHTML = Array.from({length: 60}, (_, i) =>
        `<div class="wheel-item" data-v="${i}">${pad(i)}分</div>`
      ).join('');

      hourCol.addEventListener('scroll', function() {
        const idx = Math.round(hourCol.scrollTop / 40);
        pickerH = Math.max(0, Math.min(23, idx));
        updateActive();
      });
      minCol.addEventListener('scroll', function() {
        const idx = Math.round(minCol.scrollTop / 40);
        pickerM = Math.max(0, Math.min(59, idx));
        updateActive();
      });
    }

    function scrollTo(col, val) {
      col.scrollTop = val * 40;
    }

    function updateActive() {
      hourCol.querySelectorAll('.wheel-item').forEach((el, i) => el.classList.toggle('active', i === pickerH));
      minCol.querySelectorAll('.wheel-item').forEach((el, i) => el.classList.toggle('active', i === pickerM));
    }

    // 计算
    calcBtn.onclick = function() {
      if (selected < 0) return;
      const { hour, minute } = times[selected];
      const now = new Date();
      const target = new Date(now);
      target.setDate(target.getDate() + 1);
      target.setHours(hour, minute, 0, 0);

      let diff = target - now;
      const isPast = diff < 0;
      if (diff < 0) diff = Math.abs(diff);

      const totalMin = Math.floor(diff / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;

      resultText.textContent = `距离明天 ${pad(hour)}:${pad(minute)} ${isPast ? '已过' : '还剩'} ${h} 小时 ${m} 分钟`;
      resultCard.classList.add('show');
    };

    init();
  </script>
</body>
</html>
