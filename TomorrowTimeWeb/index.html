<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>时间计算器</title>
  <!-- iOS 主屏幕图标 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='62' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <link rel="apple-touch-icon-precomposed" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='62' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <meta name="apple-mobile-web-app-title" content="时间计算器">
  <style>
    :root {
      --primary: #1A73E8;
      --primary-light: #E8F0FE;
      --text: #202124;
      --border: #DADCE0;
      --bg: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      background: white;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--primary);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    /* Preset List */
    .preset-list {
      padding: 16px;
    }
    .preset-item-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      margin-bottom: 8px;
      background: white;
    }
    .preset-item {
      background: white;
      border: 1px solid var(--border);
      padding: 14px 16px;
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
    }
    .preset-item.selected {
      background: var(--primary-light);
      border-color: var(--primary);
      border-left: 4px solid var(--primary);
    }
    .preset-item .time-text {
      flex: 1;
    }
    .delete-btn {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 70px;
      background: #F44336;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transform: translateX(70px);
      transition: transform 0.2s;
    }
    .preset-item-wrapper.show-delete .preset-item {
      transform: translateX(-70px);
    }
    .preset-item-wrapper.show-delete .delete-btn {
      transform: translateX(0);
    }
    .empty-hint {
      text-align: center;
      color: #9AA0A6;
      padding: 40px 16px;
      font-size: 14px;
    }

    /* Add Button */
    .add-section {
      padding: 0 16px 16px;
    }
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--primary);
      font-size: 16px;
      padding: 14px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
      cursor: pointer;
    }

    /* Calc Section */
    .calc-section {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .calc-btn {
      width: 80%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      padding: 14px;
      cursor: pointer;
    }
    .calc-btn:disabled {
      background: #DADCE0;
      color: #9AA0A6;
      cursor: not-allowed;
    }
    .result-card {
      width: 90%;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .result-text {
      font-size: 18px;
      color: var(--text);
      line-height: 1.6;
    }

    /* Picker Modal */
    .picker-mask {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .picker-mask.active { display: block; }
    .picker-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
    }
    .cancel-btn { color: #666; cursor: pointer; }
    .confirm-btn { color: var(--primary); font-weight: bold; cursor: pointer; }
    .title { color: var(--text); }
    .wheel-picker {
      display: flex;
      height: 200px;
      overflow: hidden;
    }
    .wheel-col-wrapper {
      flex: 1;
      position: relative;
    }
    .wheel-col-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 40px;
      transform: translateY(-50%);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      pointer-events: none;
    }
    .wheel-column {
      flex: 1;
      height: 200px;
      overflow-y: scroll;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .wheel-column::-webkit-scrollbar { display: none; }
    .wheel-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #9AA0A6;
    }
    .wheel-item.active {
      color: var(--text);
      font-weight: 600;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">时间计算器</div>

    <div class="preset-list" id="presetList"></div>

    <div class="add-section">
      <div class="add-btn" id="addBtn">
        <span>+</span> 添加时间
      </div>
    </div>

    <div class="calc-section">
      <button class="calc-btn" id="calcBtn" disabled>计算</button>
      <div class="result-card" id="resultCard" style="display:none">
        <div class="result-text" id="resultText"></div>
      </div>
    </div>
  </div>

  <!-- Picker Modal -->
  <div class="picker-mask" id="pickerMask">
    <div class="picker-panel">
      <div class="picker-header">
        <span class="cancel-btn" id="cancelBtn">取消</span>
        <span class="title">选择时间</span>
        <span class="confirm-btn" id="confirmBtn">确定</span>
      </div>
      <div class="wheel-picker">
        <div class="wheel-col-wrapper">
          <div class="wheel-column" id="hourColumn"></div>
        </div>
        <div class="wheel-col-wrapper">
          <div class="wheel-column" id="minuteColumn"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let presetTimes = [];
    let selectedIndex = -1;
    let touchStartX = 0;
    let pickerHour = 0;
    let pickerMinute = 0;

    // DOM refs
    const presetList = document.getElementById('presetList');
    const calcBtn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    const pickerMask = document.getElementById('pickerMask');
    const hourColumn = document.getElementById('hourColumn');
    const minuteColumn = document.getElementById('minuteColumn');

    // Init
    function init() {
      const saved = localStorage.getItem('presetTimes');
      if (saved) {
        presetTimes = JSON.parse(saved).map(item => ({ ...item, showDelete: false }));
        presetTimes.sort(sortTimes);
      }
      render();
      buildPicker();
    }

    function sortTimes(a, b) {
      if (a.hour !== b.hour) return a.hour - b.hour;
      return a.minute - b.minute;
    }

    // Render list
    function render() {
      presetTimes.forEach((item) => item.showDelete = false);

      if (presetTimes.length === 0) {
        presetList.innerHTML = '<div class="empty-hint">暂无预设时间，请点击下方添加</div>';
      } else {
        presetList.innerHTML = presetTimes.map((item, i) => `
          <div class="preset-item-wrapper ${item.showDelete ? 'show-delete' : ''}" data-index="${i}">
            <div class="preset-item ${selectedIndex === i ? 'selected' : ''}" data-index="${i}">
              <span class="time-text">${pad(item.hour)}:${pad(item.minute)}</span>
            </div>
            <div class="delete-btn" data-index="${i}">删除</div>
          </div>
        `).join('');
      }

      calcBtn.disabled = selectedIndex === -1;
      resultCard.style.display = 'none';
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    // Event: preset list click
    presetList.onclick = function(e) {
      const delBtn = e.target.closest('.delete-btn');
      if (delBtn) {
        e.stopPropagation();
        const idx = parseInt(delBtn.dataset.index);
        presetTimes.splice(idx, 1);
        if (selectedIndex >= presetTimes.length) selectedIndex = presetTimes.length > 0 ? presetTimes.length - 1 : -1;
        save();
        render();
        return;
      }

      const item = e.target.closest('.preset-item');
      if (item) {
        selectedIndex = parseInt(item.dataset.index);
        render();
      }
    };

    // Event: touch swipe
    presetList.ontouchstart = function(e) {
      const item = e.target.closest('.preset-item-wrapper');
      if (!item) return;
      touchStartX = e.touches[0].clientX;
    };

    presetList.ontouchend = function(e) {
      const item = e.target.closest('.preset-item-wrapper');
      if (!item) return;
      const deltaX = e.changedTouches[0].clientX - touchStartX;
      const idx = parseInt(item.dataset.index);

      if (deltaX > 50) {
        // 右滑，显示删除
        presetTimes.forEach((t, i) => t.showDelete = i === idx);
      } else if (deltaX < -50) {
        // 左滑，隐藏删除
        presetTimes.forEach(t => t.showDelete = false);
      }
      render();
    };

    presetList.ontouchmove = function(e) {
      // 阻止页面滚动与列表滑动冲突
    };

    // Event: add button
    document.getElementById('addBtn').onclick = function() {
      const now = new Date();
      pickerHour = now.getHours() + 1;
      if (pickerHour >= 24) pickerHour = 0;
      pickerMinute = now.getMinutes();
      pickerMask.classList.add('active');
      scrollToActive(hourColumn, pickerHour);
      scrollToActive(minuteColumn, pickerMinute);
    };

    // Event: cancel picker
    document.getElementById('cancelBtn').onclick = function() {
      pickerMask.classList.remove('active');
    };

    // Event: confirm picker
    document.getElementById('confirmBtn').onclick = function() {
      const newTime = { hour: pickerHour, minute: pickerMinute, showDelete: false };
      presetTimes.push(newTime);
      presetTimes.sort(sortTimes);
      save();
      render();
      pickerMask.classList.remove('active');
    };

    // Build picker wheels
    function buildPicker() {
      hourColumn.innerHTML = Array.from({length: 24}, (_, i) =>
        `<div class="wheel-item" data-val="${i}">${pad(i)}时</div>`
      ).join('');
      minuteColumn.innerHTML = Array.from({length: 60}, (_, i) =>
        `<div class="wheel-item" data-val="${i}">${pad(i)}分</div>`
      ).join('');

      hourColumn.onscroll = function() {
        const idx = Math.round(hourColumn.scrollTop / 40);
        pickerHour = Math.max(0, Math.min(23, idx));
        updateActive(hourColumn, pickerHour);
      };
      minuteColumn.onscroll = function() {
        const idx = Math.round(minuteColumn.scrollTop / 40);
        pickerMinute = Math.max(0, Math.min(59, idx));
        updateActive(minuteColumn, pickerMinute);
      };
    }

    function scrollToActive(col, val) {
      col.scrollTop = val * 40;
      updateActive(col, val);
    }

    function updateActive(col, val) {
      col.querySelectorAll('.wheel-item').forEach((el, i) => {
        el.classList.toggle('active', i === val);
      });
    }

    // Event: calculate
    calcBtn.onclick = function() {
      if (selectedIndex === -1) return;
      const { hour, minute } = presetTimes[selectedIndex];
      const now = new Date();
      const target = new Date(now);
      target.setDate(target.getDate() + 1);
      target.setHours(hour, minute, 0, 0);

      let diffMs = target - now;
      let isPast = false;
      if (diffMs < 0) {
        isPast = true;
        diffMs = Math.abs(diffMs);
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      const prefix = isPast ? '已过 ' : '还剩 ';
      resultText.textContent = `距离明天 ${pad(hour)}:${pad(minute)} ${prefix}${hours} 小时 ${minutes} 分钟`;
      resultCard.style.display = 'block';
    };

    function save() {
      localStorage.setItem('presetTimes', JSON.stringify(presetTimes));
    }

    init();
  </script>
</body>
</html>
