<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>时间计算器</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <link rel="apple-touch-icon-precomposed" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A73E8'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>⏰</text></svg>">
  <meta name="apple-mobile-web-app-title" content="时间计算器">
  <style>
    :root {
      --primary: #1A73E8;
      --primary-light: #E8F0FE;
      --text: #202124;
      --border: #DADCE0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      background: white;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .list { padding: 16px; }
    .item {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .item.selected {
      background: var(--primary-light);
      border-left: 4px solid var(--primary);
    }
    .item-time {
      flex: 1;
      padding: 14px 16px;
      font-size: 18px;
    }
    .item-delete {
      padding: 14px 16px;
      background: #F44336;
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }
    .item.show-delete .item-delete { display: block; }
    .empty-hint {
      text-align: center;
      color: #9AA0A6;
      padding: 40px;
      font-size: 14px;
    }
    .add-section { padding: 0 16px 16px; }
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--primary);
      font-size: 16px;
      padding: 14px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
    }
    .calc-section {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .calc-btn {
      width: 80%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      padding: 14px;
    }
    .calc-btn:disabled { background: #DADCE0; color: #9AA0A6; }
    .result-card {
      width: 90%;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      display: none;
    }
    .result-card.show { display: block; }
    .result-text { font-size: 18px; line-height: 1.6; }
    .picker-mask {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .picker-mask.active { display: block; }
    .picker-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .cancel-btn { color: #666; font-size: 16px; }
    .confirm-btn { color: var(--primary); font-size: 16px; font-weight: bold; }
    .title { color: var(--text); font-size: 16px; }
    .wheel { display: flex; height: 200px; overflow: hidden; }
    .wheel-col { flex: 1; height: 200px; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
    .wheel-col::-webkit-scrollbar { display: none; }
    .wheel-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #9AA0A6;
    }
    .wheel-item.active { color: var(--text); font-weight: 600; font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">时间计算器</div>
    <div class="list" id="list"></div>
    <div class="add-section">
      <div class="add-btn" id="addBtn">+ 添加时间</div>
    </div>
    <div class="calc-section">
      <button class="calc-btn" id="calcBtn" disabled>计算</button>
      <div class="result-card" id="resultCard">
        <div class="result-text" id="resultText"></div>
      </div>
    </div>
  </div>

  <div class="picker-mask" id="pickerMask">
    <div class="picker-panel">
      <div class="picker-header">
        <span class="cancel-btn" id="cancelBtn">取消</span>
        <span class="title">选择时间</span>
        <span class="confirm-btn" id="confirmBtn">确定</span>
      </div>
      <div class="wheel">
        <div class="wheel-col" id="hourCol"></div>
        <div class="wheel-col" id="minCol"></div>
      </div>
    </div>
  </div>

  <script>
    let times = [];
    let selected = -1;
    let touchStartX = 0;
    let pickerH = 9, pickerM = 0;

    const list = document.getElementById('list');
    const calcBtn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    const pickerMask = document.getElementById('pickerMask');
    const hourCol = document.getElementById('hourCol');
    const minCol = document.getElementById('minCol');

    function init() {
      const s = localStorage.getItem('t');
      if (s) times = JSON.parse(s);
      render();
      buildPicker();
    }

    function save() { localStorage.setItem('t', JSON.stringify(times)); }
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function render() {
      if (!times.length) {
        list.innerHTML = '<div class="empty-hint">暂无预设时间，请点击下方添加</div>';
      } else {
        list.innerHTML = times.map((t, i) => `
          <div class="item ${t.show ? 'show-delete' : ''}" data-idx="${i}">
            <div class="item-time" data-idx="${i}">${pad(t.hour)}:${pad(t.minute)}</div>
            <div class="item-delete" data-idx="${i}">删除</div>
          </div>
        `).join('');

        list.querySelectorAll('.item').forEach(el => {
          el.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
          }, { passive: true });
          el.addEventListener('touchend', function(e) {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const idx = parseInt(el.dataset.idx);
            if (Math.abs(dx) > 10) {
              e.preventDefault();
              if (dx > 40) {
                times.forEach((t, i) => t.show = i === idx);
              } else {
                times.forEach(t => t.show = false);
              }
              render();
            }
          });
        });
      }
      calcBtn.disabled = selected === -1;
      resultCard.classList.remove('show');
    }

    list.addEventListener('click', function(e) {
      const del = e.target.closest('.item-delete');
      if (del) {
        const idx = parseInt(del.dataset.idx);
        times.splice(idx, 1);
        if (selected >= times.length) selected = times.length > 0 ? times.length - 1 : -1;
        if (selected < 0) selected = -1;
        save();
        render();
        return;
      }
      const timeEl = e.target.closest('.item-time');
      if (timeEl) {
        selected = parseInt(timeEl.dataset.idx);
        times.forEach(t => t.show = false);
        render();
      }
    });

    document.getElementById('addBtn').onclick = function() {
      const now = new Date();
      pickerH = Math.min(23, now.getHours() + 1);
      pickerM = now.getMinutes();
      times.forEach(t => t.show = false);
      render();
      pickerMask.classList.add('active');
      hourCol.scrollTop = pickerH * 40;
      minCol.scrollTop = pickerM * 40;
      updateActive();
    };

    document.getElementById('cancelBtn').onclick = function() { pickerMask.classList.remove('active'); };

    document.getElementById('confirmBtn').onclick = function() {
      times.push({ hour: pickerH, minute: pickerM, show: false });
      times.sort((a, b) => a.hour !== b.hour ? a.hour - b.hour : a.minute - b.minute);
      save();
      render();
      pickerMask.classList.remove('active');
    };

    function buildPicker() {
      hourCol.innerHTML = Array.from({length: 24}, (_, i) =>
        `<div class="wheel-item" data-v="${i}">${pad(i)}时</div>`
      ).join('');
      minCol.innerHTML = Array.from({length: 60}, (_, i) =>
        `<div class="wheel-item" data-v="${i}">${pad(i)}分</div>`
      ).join('');
      hourCol.addEventListener('scroll', function() {
        pickerH = Math.round(hourCol.scrollTop / 40);
        updateActive();
      });
      minCol.addEventListener('scroll', function() {
        pickerM = Math.round(minCol.scrollTop / 40);
        updateActive();
      });
    }

    function updateActive() {
      hourCol.querySelectorAll('.wheel-item').forEach((el, i) => el.classList.toggle('active', i === pickerH));
      minCol.querySelectorAll('.wheel-item').forEach((el, i) => el.classList.toggle('active', i === pickerM));
    }

    calcBtn.onclick = function() {
      if (selected < 0) return;
      const { hour, minute } = times[selected];
      const now = new Date();
      const target = new Date(now);
      target.setDate(target.getDate() + 1);
      target.setHours(hour, minute, 0, 0);
      let diff = target - now;
      const isPast = diff < 0;
      if (diff < 0) diff = Math.abs(diff);
      const totalMin = Math.floor(diff / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      resultText.textContent = `距离明天 ${pad(hour)}:${pad(minute)} ${isPast ? '已过' : '还剩'} ${h} 小时 ${m} 分钟`;
      resultCard.classList.add('show');
    };

    init();
  </script>
</body>
</html>
