<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>时间计算器</title>
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="时间计算器">
  <style>
    :root {
      --primary: #1A73E8;
      --primary-light: #E8F0FE;
      --text: #202124;
      --border: #DADCE0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      background: white;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .list { padding: 16px; }
    .row {
      display: flex;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .row.selected {
      background: var(--primary-light);
      border-color: var(--primary);
    }
    .row.selected .time { border-left: 4px solid var(--primary); }
    .time {
      flex: 1;
      padding: 14px 16px;
      font-size: 18px;
      cursor: pointer;
      border-left: 4px solid transparent;
    }
    .del {
      padding: 14px 16px;
      background: #F44336;
      color: white;
      cursor: pointer;
      display: none;
      align-items: center;
      font-size: 14px;
    }
    .row.showDel .del { display: flex; }
    .empty {
      text-align: center;
      color: #9AA0A6;
      padding: 40px;
      font-size: 14px;
    }
    .addSection { padding: 0 16px 16px; }
    .addBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--primary);
      font-size: 16px;
      padding: 14px;
      border: 1px dashed var(--primary);
      border-radius: 8px;
    }
    .calcSection { padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .calcBtn {
      width: 80%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      padding: 14px;
    }
    .calcBtn:disabled { background: #DADCE0; color: #9AA0A6; }
    .resultCard {
      width: 90%;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      display: none;
    }
    .resultCard.show { display: block; }
    .resultText { font-size: 18px; line-height: 1.6; }
    .pickerMask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .pickerMask.active { display: block; }
    .pickerPanel { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 16px 16px 0 0; padding-bottom: env(safe-area-inset-bottom); }
    .pickerHeader { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
    .cancelBtn { color: #666; font-size: 16px; cursor: pointer; }
    .confirmBtn { color: var(--primary); font-size: 16px; font-weight: bold; cursor: pointer; }
    .pickerTitle { color: var(--text); font-size: 16px; }
    .wheel { display: flex; height: 200px; }
    .wheelCol { flex: 1; height: 200px; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
    .wheelCol::-webkit-scrollbar { display: none; }
    .wheelItem { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #9AA0A6; }
    .wheelItem.active { color: var(--text); font-weight: 600; font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">时间计算器</div>
    <div class="list" id="list"></div>
    <div class="addSection">
      <div class="addBtn" id="addBtn">+ 添加时间</div>
    </div>
    <div class="calcSection">
      <button class="calcBtn" id="calcBtn" disabled>计算</button>
      <div class="resultCard" id="resultCard">
        <div class="resultText" id="resultText"></div>
      </div>
    </div>
  </div>

  <div class="pickerMask" id="pickerMask">
    <div class="pickerPanel">
      <div class="pickerHeader">
        <span class="cancelBtn" id="cancelBtn">取消</span>
        <span class="pickerTitle">选择时间</span>
        <span class="confirmBtn" id="confirmBtn">确定</span>
      </div>
      <div class="wheel">
        <div class="wheelCol" id="hourCol"></div>
        <div class="wheelCol" id="minCol"></div>
      </div>
    </div>
  </div>

  <script>
    let times = [];
    let selected = -1;
    let showDel = -1;
    let pickerH = 9, pickerM = 0;
    let touchStartX = 0;

    const list = document.getElementById('list');
    const calcBtn = document.getElementById('calcBtn');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    const pickerMask = document.getElementById('pickerMask');
    const hourCol = document.getElementById('hourCol');
    const minCol = document.getElementById('minCol');

    function init() {
      const s = localStorage.getItem('t');
      if (s) times = JSON.parse(s);
      render();
      buildPicker();
    }

    function save() { localStorage.setItem('t', JSON.stringify(times)); }
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function render() {
      if (!times.length) {
        list.innerHTML = '<div class="empty">暂无预设时间，请点击下方添加</div>';
      } else {
        let html = '';
        for (let i = 0; i < times.length; i++) {
          const t = times[i];
          const isSel = i === selected;
          const isShowDel = i === showDel;
          html += `<div class="row${isSel ? ' selected' : ''}${isShowDel ? ' showDel' : ''}" data-i="${i}">` +
            `<div class="time" data-i="${i}">${pad(t.hour)}:${pad(t.minute)}</div>` +
            `<div class="del" data-i="${i}">删除</div>` +
            `</div>`;
        }
        list.innerHTML = html;
      }
      calcBtn.disabled = selected === -1;
      resultCard.classList.remove('show');
    }

    // 点击（选中或删除）
    list.onclick = function(e) {
      const i = parseInt(e.target.dataset.i);
      if (isNaN(i)) return;

      if (e.target.classList.contains('del')) {
        // 删除
        times.splice(i, 1);
        if (selected >= times.length) selected = times.length > 0 ? times.length - 1 : -1;
        if (selected < 0) selected = -1;
        showDel = -1;
        save();
        render();
        return;
      }

      if (e.target.classList.contains('time')) {
        // 选中
        selected = i;
        showDel = -1;
        render();
        return;
      }
    };

    // 滑动
    list.ontouchstart = function(e) {
      const row = e.target.closest('.row');
      if (row) touchStartX = e.touches[0].clientX;
    };

    list.ontouchend = function(e) {
      const row = e.target.closest('.row');
      if (!row) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const i = parseInt(row.dataset.i);

      if (dx > 40) {
        showDel = i;
      } else if (dx < -40) {
        showDel = -1;
      } else {
        // 忽略微小移动，不改变 showDel 状态
        return;
      }
      render();
    };

    // 添加
    document.getElementById('addBtn').onclick = function() {
      const now = new Date();
      pickerH = Math.min(23, now.getHours() + 1);
      pickerM = now.getMinutes();
      showDel = -1;
      render();
      pickerMask.classList.add('active');
      hourCol.scrollTop = pickerH * 40;
      minCol.scrollTop = pickerM * 40;
      updateActive();
    };

    document.getElementById('cancelBtn').onclick = function() {
      pickerMask.classList.remove('active');
    };

    document.getElementById('confirmBtn').onclick = function() {
      times.push({ hour: pickerH, minute: pickerM });
      times.sort(function(a, b) {
        if (a.hour !== b.hour) return a.hour - b.hour;
        return a.minute - b.minute;
      });
      save();
      render();
      pickerMask.classList.remove('active');
    };

    function buildPicker() {
      let h = '', m = '';
      for (let i = 0; i < 24; i++) h += '<div class="wheelItem" data-v="' + i + '">' + pad(i) + '时</div>';
      for (let i = 0; i < 60; i++) m += '<div class="wheelItem" data-v="' + i + '">' + pad(i) + '分</div>';
      hourCol.innerHTML = h;
      minCol.innerHTML = m;

      hourCol.addEventListener('scroll', function() {
        pickerH = Math.round(hourCol.scrollTop / 40);
        updateActive();
      });
      minCol.addEventListener('scroll', function() {
        pickerM = Math.round(minCol.scrollTop / 40);
        updateActive();
      });
    }

    function updateActive() {
      var hItems = hourCol.querySelectorAll('.wheelItem');
      var mItems = minCol.querySelectorAll('.wheelItem');
      for (var i = 0; i < hItems.length; i++) hItems[i].classList.toggle('active', i === pickerH);
      for (var i = 0; i < mItems.length; i++) mItems[i].classList.toggle('active', i === pickerM);
    }

    // 计算
    calcBtn.onclick = function() {
      if (selected < 0) return;
      var t = times[selected];
      var now = new Date();
      var target = new Date(now);
      target.setDate(target.getDate() + 1);
      target.setHours(t.hour, t.minute, 0, 0);
      var diff = target - now;
      var isPast = diff < 0;
      if (diff < 0) diff = Math.abs(diff);
      var totalMin = Math.floor(diff / 60000);
      var h = Math.floor(totalMin / 60);
      var m = totalMin % 60;
      resultText.textContent = '距离明天 ' + pad(t.hour) + ':' + pad(t.minute) + ' ' + (isPast ? '已过' : '还剩') + ' ' + h + ' 小时 ' + m + ' 分钟';
      resultCard.classList.add('show');
    };

    init();
  </script>
</body>
</html>
